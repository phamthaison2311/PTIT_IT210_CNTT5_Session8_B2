<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới nhân viên</title>
</head>
<body>

<h2>Thêm mới nhân viên</h2>

<div th:if="${error}">
    <p style="color: red" th:text="${error}"></p>
</div>

<form th:action="@{/hr/add-employee}" method="post" th:object="${employee}">

    <div class="form-group">
        <label for="fullName">Họ và tên:</label><br>
        <input type="text" id="fullName" th:field="*{fullName}"
               th:classappend="${#fields.hasErrors('fullName')} ? 'input-error' : ''">
        <p style="color: red" th:if="${#fields.hasErrors('fullName')}" th:errors="*{fullName}"></p>
    </div>

    <div class="form-group">
        <label for="email">Email:</label><br>
        <input type="text" id="email" th:field="*{email}"
               th:classappend="${#fields.hasErrors('email')} ? 'input-error' : ''">
        <p style="color: red" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
    </div>

    <div class="form-group">
        <label for="age">Tuổi (18 - 60):</label><br>
        <input type="number" id="age" th:field="*{age}"
               th:classappend="${#fields.hasErrors('age')} ? 'input-error' : ''">
        <p style="color: red" th:if="${#fields.hasErrors('age')}" th:errors="*{age}"></p>
    </div>

    <button type="submit">Submit</button>
</form>

</body>
</html>
